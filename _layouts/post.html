<!doctype html>
<html>
  {% include head.html %}
  <body>
    {% include header.html %}
    <div id="content">
      <article>
        <div class="center">
        <h1 class="title">{{ page.title }}</h1>
        <time class="code">{{ page.date | date_to_string }}</time>
        </div>
        <div class="divider"></div>
      {{ content }}
      </article>
      <div class="page-navigation code">
        {% if page.previous.url %}
        <a class="prev" href="{{page.previous.url}}" title="PREV: {{page.previous.title}}"><<</a>
        <span> · </span>
        {% endif %}
        <a class="home" href="/index.html">producedbyandre.me</a>
        {% if page.next.url %}
        <span> · </span>
        <a class="next" href="{{page.next.url}}" title="NEXT: {{page.next.title}}">>></a>
        {% endif %}

      </div>
    </div>
  </body>
  {% include footer.html %}
</html>
